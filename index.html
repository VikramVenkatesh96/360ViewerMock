<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0d0d0d">
<title>Virtual Tour</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.css">
<script src="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.js"></script>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  :root {
    --gold: #c9a84c;
    --gold-dim: rgba(201,168,76,0.35);
    --dark: #0d0d0d;
    --dark2: #161616;
    --dark3: #1f1f1f;
    --text: #f0ece3;
    --muted: #7a7570;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }

  html, body {
    height: 100%; width: 100%;
    overflow: hidden;
    background: var(--dark);
    color: var(--text);
    font-family: 'Georgia', serif;
    touch-action: none;
  }

  /* ── LAYOUT ── */
  #app {
    display: flex;
    flex-direction: column;
    height: 100%;
    height: 100dvh;
  }

  /* ── HEADER ── */
  header {
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 16px;
    padding-top: calc(10px + var(--safe-top));
    background: var(--dark);
    border-bottom: 1px solid rgba(201,168,76,0.2);
    z-index: 200;
    gap: 10px;
  }

  .logo {
    font-size: 15px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--gold);
    white-space: nowrap;
  }
  .logo small {
    display: block;
    font-size: 9px;
    letter-spacing: 2px;
    color: var(--muted);
    margin-top: 1px;
    font-family: 'Helvetica Neue', sans-serif;
  }

  .scene-label {
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    font-family: 'Helvetica Neue', sans-serif;
    text-align: right;
    white-space: nowrap;
  }
  .scene-label strong { color: var(--gold); font-weight: normal; display: block; font-size: 11px; }

  /* ── VIEWER ── */
  #viewer-wrap {
    flex: 1;
    position: relative;
    overflow: hidden;
    min-height: 0;
  }

  #panorama {
    width: 100%;
    height: 100%;
  }

  /* Override pannellum defaults for mobile */
  .pnlm-container { background: var(--dark) !important; }
  .pnlm-load-box { display: none !important; }
  .pnlm-compass { display: none !important; }
  .pnlm-controls-container { display: none !important; }

  /* ── PROGRESSIVE LOAD OVERLAY ── */
  #load-overlay {
    position: absolute;
    inset: 0;
    z-index: 50;
    pointer-events: none;
    transition: opacity 0.4s ease;
    background: var(--dark);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 14px;
  }
  #load-overlay.hidden { opacity: 0; pointer-events: none; }

  .load-spinner {
    width: 40px; height: 40px;
    border: 2px solid rgba(201,168,76,0.2);
    border-top-color: var(--gold);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .load-text {
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--muted);
    font-family: 'Helvetica Neue', sans-serif;
  }

  /* Quality badge */
  #quality-badge {
    position: absolute;
    top: 12px;
    left: 12px;
    font-size: 9px;
    letter-spacing: 2px;
    text-transform: uppercase;
    font-family: 'Helvetica Neue', sans-serif;
    color: var(--gold);
    background: rgba(0,0,0,0.5);
    border: 1px solid var(--gold-dim);
    padding: 3px 8px;
    border-radius: 20px;
    z-index: 30;
    transition: opacity 0.3s;
  }

  /* ── SCENE NAV STRIP ── */
  #scene-nav {
    flex-shrink: 0;
    display: flex;
    overflow-x: auto;
    overflow-y: hidden;
    gap: 8px;
    padding: 10px 12px;
    padding-bottom: calc(10px + var(--safe-bottom));
    background: var(--dark2);
    border-top: 1px solid rgba(201,168,76,0.15);
    scroll-snap-type: x mandatory;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  #scene-nav::-webkit-scrollbar { display: none; }

  .scene-btn {
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 5px;
    cursor: pointer;
    scroll-snap-align: start;
    border: none;
    background: none;
    padding: 0;
    -webkit-tap-highlight-color: transparent;
  }

  .scene-thumb {
    width: 64px;
    height: 44px;
    border-radius: 6px;
    overflow: hidden;
    border: 2px solid transparent;
    transition: border-color 0.2s, transform 0.15s;
    background: var(--dark3);
    position: relative;
  }
  .scene-thumb img {
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
  }
  .scene-btn.active .scene-thumb { border-color: var(--gold); }
  .scene-btn:active .scene-thumb { transform: scale(0.94); }

  .scene-thumb-tag {
    position: absolute;
    top: 3px; left: 3px;
    font-size: 7px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: #fff;
    background: rgba(0,0,0,0.6);
    padding: 1px 4px;
    border-radius: 3px;
    font-family: 'Helvetica Neue', sans-serif;
  }

  .scene-name {
    font-size: 9px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
    font-family: 'Helvetica Neue', sans-serif;
    max-width: 64px;
    text-align: center;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .scene-btn.active .scene-name { color: var(--gold); }

  /* ── CHATBOT ── */
  #chat-fab {
    position: absolute;
    bottom: calc(12px + var(--safe-bottom));
    right: 14px;
    width: 50px; height: 50px;
    background: var(--dark2);
    border: 1.5px solid var(--gold-dim);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
    cursor: pointer;
    z-index: 100;
    box-shadow: 0 4px 20px rgba(0,0,0,0.6);
    transition: background 0.15s, transform 0.15s;
    /* Offset from scene nav */
    bottom: calc(84px + var(--safe-bottom));
  }
  #chat-fab:active { transform: scale(0.92); background: rgba(201,168,76,0.15); }

  #chat-drawer {
    position: absolute;
    inset: 0;
    z-index: 150;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    pointer-events: none;
  }

  #chat-panel {
    background: var(--dark2);
    border-top: 1px solid rgba(201,168,76,0.25);
    border-radius: 18px 18px 0 0;
    display: flex;
    flex-direction: column;
    max-height: 72vh;
    transform: translateY(100%);
    transition: transform 0.35s cubic-bezier(0.32,0,0.15,1);
    pointer-events: all;
    overflow: hidden;
  }
  #chat-panel.open { transform: translateY(0); }

  .chat-drag-handle {
    width: 36px; height: 4px;
    background: rgba(201,168,76,0.3);
    border-radius: 2px;
    margin: 10px auto 4px;
    flex-shrink: 0;
  }

  .chat-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 16px 12px;
    flex-shrink: 0;
    border-bottom: 1px solid rgba(201,168,76,0.15);
  }
  .chat-icon { font-size: 16px; }
  .chat-title {
    font-size: 11px;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: var(--gold);
    font-family: 'Helvetica Neue', sans-serif;
  }
  .chat-close {
    margin-left: auto;
    background: none; border: none;
    color: var(--muted); font-size: 20px;
    cursor: pointer; padding: 4px;
    line-height: 1;
  }

  .chat-body {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    padding: 14px 14px 8px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    -webkit-overflow-scrolling: touch;
    overscroll-behavior: contain;
  }
  .chat-body::-webkit-scrollbar { display: none; }

  .msg {
    max-width: 88%;
    padding: 10px 13px;
    border-radius: 14px;
    font-size: 13.5px;
    line-height: 1.5;
    font-family: 'Helvetica Neue', sans-serif;
  }
  .msg.bot {
    background: var(--dark3);
    border: 1px solid rgba(201,168,76,0.12);
    color: var(--text);
    align-self: flex-start;
    border-radius: 4px 14px 14px 14px;
  }
  .msg.user {
    background: rgba(201,168,76,0.14);
    border: 1px solid rgba(201,168,76,0.28);
    color: var(--text);
    align-self: flex-end;
    border-radius: 14px 4px 14px 14px;
  }
  .msg.thinking {
    background: var(--dark3);
    color: var(--muted);
    align-self: flex-start;
    font-style: italic;
    border-radius: 4px 14px 14px 14px;
    font-size: 12px;
  }

  .quick-qs {
    display: flex;
    flex-wrap: wrap;
    gap: 7px;
    margin-top: 2px;
  }
  .quick-q {
    font-family: 'Helvetica Neue', sans-serif;
    font-size: 12px;
    background: transparent;
    border: 1px solid rgba(201,168,76,0.3);
    color: #d4b96a;
    padding: 6px 12px;
    border-radius: 20px;
    cursor: pointer;
    text-align: left;
    transition: background 0.15s;
  }
  .quick-q:active { background: rgba(201,168,76,0.15); }

  .chat-input-row {
    display: flex;
    gap: 8px;
    padding: 10px 12px;
    padding-bottom: calc(10px + var(--safe-bottom));
    border-top: 1px solid rgba(201,168,76,0.12);
    flex-shrink: 0;
    background: var(--dark2);
  }

  #chat-input {
    flex: 1;
    background: var(--dark3);
    border: 1px solid rgba(201,168,76,0.25);
    border-radius: 22px;
    padding: 10px 15px;
    font-size: 14px;
    color: var(--text);
    font-family: 'Helvetica Neue', sans-serif;
    outline: none;
    -webkit-appearance: none;
  }
  #chat-input::placeholder { color: var(--muted); }

  #send-btn {
    width: 40px; height: 40px;
    background: rgba(201,168,76,0.18);
    border: 1px solid rgba(201,168,76,0.4);
    border-radius: 50%;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    color: var(--gold);
    font-size: 16px;
    flex-shrink: 0;
    transition: background 0.15s;
  }
  #send-btn:active { background: rgba(201,168,76,0.35); }

  /* Backdrop */
  #chat-backdrop {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 140;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
  }
  #chat-backdrop.visible { opacity: 1; pointer-events: all; }
</style>
</head>
<body>

<div id="app">

  <header>
    <div class="logo">
      The Collection
      <small>New Kalyani Nagar · Pune</small>
    </div>
    <div class="scene-label">
      <strong id="scene-name-display">Exterior 1</strong>
      360° Virtual Tour
    </div>
  </header>

  <div id="viewer-wrap">
    <div id="panorama"></div>
    <div id="load-overlay">
      <div class="load-spinner"></div>
      <div class="load-text">Loading scene…</div>
    </div>
    <div id="quality-badge">25%</div>

    <button id="chat-fab" onclick="openChat()" aria-label="Open assistant">💬</button>
  </div>

  <div id="scene-nav" role="list" aria-label="Scenes"></div>
</div>

<!-- Chat -->
<div id="chat-drawer">
  <div id="chat-backdrop" onclick="closeChat()"></div>
  <div id="chat-panel" role="dialog" aria-label="Virtual Tour Assistant">
    <div class="chat-drag-handle"></div>
    <div class="chat-header">
      <span class="chat-icon">✦</span>
      <span class="chat-title">Ask Our Assistant</span>
      <button class="chat-close" onclick="closeChat()" aria-label="Close">×</button>
    </div>
    <div class="chat-body" id="chat-body"></div>
    <div class="chat-input-row">
      <input id="chat-input" type="text" inputmode="text" placeholder="Ask about this property…" autocomplete="off" autocorrect="off">
      <button id="send-btn" onclick="sendMsg()" aria-label="Send">➤</button>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════
// SCENE DEFINITIONS

// to which — edit these to match your layout
// ═══════════════════════════════════════════
const SCENES = [

    high: "images/interior/4/high.jpg",
    hotspots: [
      { pitch: -5, yaw: -60, text: "Interior 3", target: "int3" },
      { pitch: -5, yaw: 60,  text: "Interior 5", target: "int5" },
    ]
  },
  {
    id: "int5", group: "Interior", name: "Interior 5",
    low:  "images/interior/5/low.jpg",
    med:  "images/interior/5/med.jpg",
    high: "images/interior/5/high.jpg",
    hotspots: [
      { pitch: -5, yaw: -60, text: "Interior 4", target: "int4" },

  },
  {

    high: "images/interior/6/high.jpg",
    hotspots: [
      { pitch: -5, yaw: -60, text: "Interior 5", target: "int5" },

    ]
  },
  {
    id: "int7", group: "Interior", name: "Interior 7",
    low:  "images/interior/7/low.jpg",
    med:  "images/interior/7/med.jpg",
    high: "images/interior/7/high.jpg",
    hotspots: [
      { pitch: -5, yaw: -60, text: "Interior 6", target: "int6" },

];

// ═══════════════════════════════════════════
// Q&A DATABASE — edit for your property
// ═══════════════════════════════════════════
const QA = [
  {
    keys: ["brand","brands","store","stores","shop","shops","tenant","tenants","retail","fashion","label"],
    ans: "The Collection hosts over 40 premium fashion brands across two floors — a curated mix of international labels and Indian designers focused on contemporary luxury, occasion wear, and lifestyle."
  },
  {

    ans: "Drag or swipe to look around. Tap the glowing arrow hotspots to move between spaces. Use the thumbnail strip at the bottom to jump to any scene."
  },
  {
    keys: ["developer","builder","promoter","owner","who built","developed by"],
    ans: "Developed by a Pune-based premium real estate group with a portfolio of landmark commercial properties across Maharashtra."

const FALLBACK = "I can only answer questions about The Collection — its location, brands, amenities, pricing, and leasing. Try rephrasing around one of those topics.";

// ═══════════════════════════════════════════
// PANNELLUM VIEWER + PROGRESSIVE LOADING
// ═══════════════════════════════════════════
let viewer = null;
let currentScene = null;
let loadStage = 0; // 0=low,1=med,2=high

function buildHotspots(scene) {
  return scene.hotspots.map(h => ({
    type: "scene",
    pitch: h.pitch,
    yaw: h.yaw,
    sceneId: h.target,
    text: h.text,
    clickHandlerFunc: () => goToScene(h.target),
  }));
}

function showOverlay(show) {
  document.getElementById('load-overlay').classList.toggle('hidden', !show);
}

function setQualityBadge(label) {
  document.getElementById('quality-badge').textContent = label;
}

async function loadScene(scene) {
  if (currentScene?.id === scene.id) return;
  currentScene = scene;
  loadStage = 0;

  // Update UI
  document.getElementById('scene-name-display').textContent = scene.name;
  document.querySelectorAll('.scene-btn').forEach(b => b.classList.toggle('active', b.dataset.id === scene.id));

  showOverlay(true);
  setQualityBadge('25%');

  // Destroy old viewer
  if (viewer) { try { viewer.destroy(); } catch(e){} viewer = null; }

  // Stage 1: low quality — show immediately
  viewer = pannellum.viewer('panorama', {
    type: 'equirectangular',
    panorama: scene.low,
    autoLoad: true,
    showControls: false,
    compass: false,
    showFullscreenCtrl: false,
    showZoomCtrl: false,
    mouseZoom: false,
    hfov: 100,
    minHfov: 60,
    maxHfov: 120,
    pitch: 0,
    yaw: 0,
    hotSpots: buildHotspots(scene),
  });
  viewer.on('load', () => {
    showOverlay(false);
    setQualityBadge('25%');
    loadMed(scene);
  });
  viewer.on('error', () => { showOverlay(false); });
}

function loadMed(scene) {
  if (currentScene?.id !== scene.id) return;
  const img = new Image();
  img.onload = () => {
    if (currentScene?.id !== scene.id || !viewer) return;
    const pitch = viewer.getPitch();
    const yaw = viewer.getYaw();
    const hfov = viewer.getHfov();
    viewer.destroy();
    viewer = pannellum.viewer('panorama', {
      type: 'equirectangular',
      panorama: scene.med,
      autoLoad: true,
      showControls: false,
      compass: false,
      showFullscreenCtrl: false,
      showZoomCtrl: false,
      mouseZoom: false,
      hfov, pitch, yaw,
      minHfov: 60, maxHfov: 120,
      hotSpots: buildHotspots(scene),
    });
    viewer.on('load', () => {
      setQualityBadge('50%');
      loadHigh(scene);
    });
  };
  img.src = scene.med;
}

function loadHigh(scene) {
  if (currentScene?.id !== scene.id) return;
  const img = new Image();
  img.onload = () => {
    if (currentScene?.id !== scene.id || !viewer) return;
    const pitch = viewer.getPitch();
    const yaw = viewer.getYaw();
    const hfov = viewer.getHfov();
    viewer.destroy();
    viewer = pannellum.viewer('panorama', {
      type: 'equirectangular',
      panorama: scene.high,
      autoLoad: true,
      showControls: false,
      compass: false,
      showFullscreenCtrl: false,
      showZoomCtrl: false,
      mouseZoom: false,
      hfov, pitch, yaw,
      minHfov: 60, maxHfov: 120,
      hotSpots: buildHotspots(scene),
    });
    viewer.on('load', () => {
      setQualityBadge('HD');
      setTimeout(() => {
        document.getElementById('quality-badge').style.opacity = '0';
      }, 2000);
    });
  };
  img.src = scene.high;
}

function goToScene(id) {
  const scene = SCENES.find(s => s.id === id);
  if (scene) loadScene(scene);
}

// ═══════════════════════════════════════════
// SCENE NAV STRIP
// ═══════════════════════════════════════════
function buildNav() {
  const nav = document.getElementById('scene-nav');
  let lastGroup = null;

  SCENES.forEach(scene => {
    if (scene.group !== lastGroup) {
      const sep = document.createElement('div');
      sep.style.cssText = 'flex-shrink:0;display:flex;align-items:center;font-size:8px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);font-family:"Helvetica Neue",sans-serif;writing-mode:vertical-rl;text-orientation:mixed;padding:0 2px;';
      sep.textContent = scene.group;
      nav.appendChild(sep);
      lastGroup = scene.group;
    }

    const btn = document.createElement('button');
    btn.className = 'scene-btn';
    btn.dataset.id = scene.id;
    btn.setAttribute('role', 'listitem');
    btn.setAttribute('aria-label', scene.name);
    btn.onclick = () => loadScene(scene);

    btn.innerHTML = `
      <div class="scene-thumb">
        <img src="${scene.low}" alt="${scene.name}" loading="lazy">
        <div class="scene-thumb-tag">${scene.group === 'Exterior' ? 'EXT' : 'INT'}</div>
      </div>
      <span class="scene-name">${scene.name}</span>
    `;
    nav.appendChild(btn);
  });
}

// ═══════════════════════════════════════════
// CHAT
// ═══════════════════════════════════════════
let chatOpen = false;

function openChat() {
  chatOpen = true;
  document.getElementById('chat-panel').classList.add('open');
  document.getElementById('chat-backdrop').classList.add('visible');
  // Auto-focus input after animation
  setTimeout(() => document.getElementById('chat-input').focus(), 380);
}

function closeChat() {
  chatOpen = false;
  document.getElementById('chat-panel').classList.remove('open');
  document.getElementById('chat-backdrop').classList.remove('visible');
  document.getElementById('chat-input').blur();
}

// Close on swipe down
let dragStart = null;
document.getElementById('chat-panel').addEventListener('touchstart', e => {
  dragStart = e.touches[0].clientY;
}, { passive: true });
document.getElementById('chat-panel').addEventListener('touchmove', e => {
  if (!dragStart) return;
  const dy = e.touches[0].clientY - dragStart;
  if (dy > 60) { closeChat(); dragStart = null; }
}, { passive: true });
document.getElementById('chat-panel').addEventListener('touchend', () => { dragStart = null; }, { passive: true });

function appendMsg(text, role) {
  const body = document.getElementById('chat-body');
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  div.textContent = text;
  body.appendChild(div);
  body.scrollTop = body.scrollHeight;
  return div;
}

function findAnswer(q) {
  const lq = q.toLowerCase();
  let best = null, bestScore = 0;
  QA.forEach(qa => {
    let score = qa.keys.reduce((s, k) => s + (lq.includes(k) ? 1 + (k.length > 5 ? 0.5 : 0) : 0), 0);
    if (score > bestScore) { bestScore = score; best = qa; }
  });
  return bestScore >= 0.8 ? best.ans : null;
}

async function respond(query) {
  const thinking = appendMsg('Searching…', 'thinking');
  await new Promise(r => setTimeout(r, 500 + Math.random() * 300));
  thinking.remove();

  const local = findAnswer(query);
  if (local) { appendMsg(local, 'bot'); return; }

  try {
    const res = await fetch("https://openrouter.ai/api/v1/chat/completions", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": "Bearer YOUR_OPENROUTER_KEY",
        "HTTP-Referer": "https://vikramvenkatesh96.github.io/360ViewerMock/"
      },
      body: JSON.stringify({
        model: "mistralai/mistral-7b-instruct:free",
        messages: [
          {
            role: "system",
            content: `You are the assistant for "The Collection", a premium retail destination in New Kalyani Nagar, Pune. Only answer questions about this property using this knowledge:\n${QA.map(q => `${q.keys[0]}: ${q.ans}`).join('\n')}\nFor anything unrelated, say: "I can only assist with questions about The Collection." Keep replies to 1-2 sentences.`
          },
          { role: "user", content: query }
        ]
      })
    });
    const data = await res.json();
    const text = data.choices?.[0]?.message?.content || FALLBACK;
    appendMsg(text, 'bot');
  } catch (e) {
    appendMsg(findAnswer(query) || FALLBACK, 'bot');
  }
}

function askQ(q) {
  document.querySelector('.quick-qs')?.remove();
  appendMsg(q, 'user');
  respond(q);
}

function sendMsg() {
  const inp = document.getElementById('chat-input');
  const q = inp.value.trim();
  if (!q) return;
  inp.value = '';
  document.querySelector('.quick-qs')?.remove();
  appendMsg(q, 'user');
  respond(q);
}

document.getElementById('chat-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') { e.preventDefault(); sendMsg(); }
});

// Init chat with welcome message + quick questions
function initChat() {
  appendMsg('Welcome to The Collection! I can answer questions about this property. Try asking:', 'bot');
  const qs = document.getElementById('chat-body');
  const wrap = document.createElement('div');
  wrap.className = 'quick-qs';
  ['What brands are here?','Where is it located?','Is parking available?','How do I book a space?','What are the opening hours?']
    .forEach(q => {
      const btn = document.createElement('button');
      btn.className = 'quick-q';
      btn.textContent = q;
      btn.onclick = () => askQ(q);
      wrap.appendChild(btn);
    });
  qs.appendChild(wrap);
}

// ═══════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════
buildNav();
initChat();
loadScene(SCENES[0]);
</script>
