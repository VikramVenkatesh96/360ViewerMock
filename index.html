<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0d0d0d">
<title>Virtual Tour</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.css">
<script src="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.js"></script>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  :root {
    --gold: #c9a84c;
    --gold-dim: rgba(201,168,76,0.35);
    --dark: #0d0d0d;
    --dark2: #161616;
    --dark3: #1f1f1f;
    --text: #f0ece3;
    --muted: #7a7570;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }

  html, body {
    height: 100%; width: 100%;
    overflow: hidden;
    background: var(--dark);
    color: var(--text);
    font-family: 'Georgia', serif;
    touch-action: none;
  }

  #app {
    display: flex;
    flex-direction: column;
    height: 100%;
    height: 100dvh;
  }

  header {
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 16px;
    padding-top: calc(10px + var(--safe-top));
    background: var(--dark);
    border-bottom: 1px solid rgba(201,168,76,0.2);
    z-index: 200;
    gap: 10px;
  }

  .logo {
    font-size: 15px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--gold);
    white-space: nowrap;
  }
  .logo small {
    display: block;
    font-size: 9px;
    letter-spacing: 2px;
    color: var(--muted);
    margin-top: 1px;
    font-family: 'Helvetica Neue', sans-serif;
  }

  .scene-label {
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    font-family: 'Helvetica Neue', sans-serif;
    text-align: right;
    white-space: nowrap;
  }
  .scene-label strong { color: var(--gold); font-weight: normal; display: block; font-size: 11px; }

  #viewer-wrap {
    flex: 1;
    position: relative;
    overflow: hidden;
    min-height: 0;
  }

  #pano-a, #pano-b {
    width: 100%;
    height: 100%;
  }

  .pnlm-container { background: var(--dark) !important; }
  .pnlm-load-box { display: none !important; }
  .pnlm-compass { display: none !important; }
  .pnlm-controls-container { display: none !important; }

  .pnlm-hotspot-base { cursor: pointer; }
  .pnlm-hotspot-base svg { display: block; }

  #load-overlay {
    position: absolute;
    inset: 0;
    z-index: 50;
    pointer-events: none;
    transition: opacity 0.4s ease;
    background: var(--dark);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 14px;
  }
  #load-overlay.hidden { opacity: 0; pointer-events: none; }

  .load-spinner {
    width: 40px; height: 40px;
    border: 2px solid rgba(201,168,76,0.2);
    border-top-color: var(--gold);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .load-text {
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--muted);
    font-family: 'Helvetica Neue', sans-serif;
  }

  #quality-badge {
    position: absolute;
    top: 12px;
    left: 12px;
    font-size: 9px;
    letter-spacing: 2px;
    text-transform: uppercase;
    font-family: 'Helvetica Neue', sans-serif;
    color: var(--gold);
    background: rgba(0,0,0,0.5);
    border: 1px solid var(--gold-dim);
    padding: 3px 8px;
    border-radius: 20px;
    z-index: 30;
    transition: opacity 0.3s;
  }

  #scene-nav {
    flex-shrink: 0;
    display: flex;
    overflow-x: auto;
    overflow-y: hidden;
    gap: 8px;
    padding: 10px 12px;
    padding-bottom: calc(10px + var(--safe-bottom));
    background: var(--dark2);
    border-top: 1px solid rgba(201,168,76,0.15);
    scroll-snap-type: x mandatory;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  #scene-nav::-webkit-scrollbar { display: none; }

  .scene-btn {
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 5px;
    cursor: pointer;
    scroll-snap-align: start;
    border: none;
    background: none;
    padding: 0;
    -webkit-tap-highlight-color: transparent;
  }

  .scene-thumb {
    width: 64px;
    height: 44px;
    border-radius: 6px;
    overflow: hidden;
    border: 2px solid transparent;
    transition: border-color 0.2s, transform 0.15s;
    background: var(--dark3);
    position: relative;
  }
  .scene-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .scene-btn.active .scene-thumb { border-color: var(--gold); }
  .scene-btn:active .scene-thumb { transform: scale(0.94); }

  .scene-thumb-tag {
    position: absolute;
    top: 3px; left: 3px;
    font-size: 7px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: #fff;
    background: rgba(0,0,0,0.6);
    padding: 1px 4px;
    border-radius: 3px;
    font-family: 'Helvetica Neue', sans-serif;
  }

  .scene-name {
    font-size: 9px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
    font-family: 'Helvetica Neue', sans-serif;
    max-width: 64px;
    text-align: center;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .scene-btn.active .scene-name { color: var(--gold); }
</style>
</head>
<body>

<div id="app">
  <header>
    <div class="logo">
      The Collection
      <small>New Kalyani Nagar · Pune</small>
    </div>
    <div class="scene-label">
      <strong id="scene-name-display">Exterior 1</strong>
      360° Virtual Tour
    </div>
  </header>

  <div id="viewer-wrap">
    <div id="pano-a" style="position:absolute;inset:0;transition:opacity 0.6s ease;"></div>
    <div id="pano-b" style="position:absolute;inset:0;opacity:0;transition:opacity 0.6s ease;"></div>
    <div id="load-overlay">
      <div class="load-spinner"></div>
      <div class="load-text">Loading scene…</div>
    </div>
    <div id="quality-badge">25%</div>
    <div id="dev-coords" style="display:none;position:absolute;top:12px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.8);border:1px solid var(--gold);color:var(--gold);font-family:monospace;font-size:13px;padding:8px 16px;border-radius:8px;z-index:60;pointer-events:none;white-space:nowrap;letter-spacing:1px;"></div>
    <button id="dev-toggle" onclick="toggleDevMode()" style="display:none;position:absolute;top:12px;right:12px;background:rgba(201,168,76,0.2);border:1px solid var(--gold);color:var(--gold);font-size:10px;letter-spacing:2px;padding:6px 10px;border-radius:6px;cursor:pointer;z-index:60;font-family:monospace;">DEV: OFF</button>
  </div>

  <div id="scene-nav" role="list" aria-label="Scenes"></div>
</div>

<script>
const SCENES = [
  {
    id: "ext1", group: "Exterior", name: "Exterior 1",
    low:  "images/exterior/1/low.png",
    med:  "images/exterior/1/med.png",
    high: "images/exterior/1/high.jpg",
    hotspots: [
      { pitch: -7.5, yaw: 70.3, text: "Exterior 2", target: "ext2" },
    ]
  },
  {
    id: "ext2", group: "Exterior", name: "Exterior 2",
    low:  "images/exterior/2/low.png",
    med:  "images/exterior/2/med.png",
    high: "images/exterior/2/high.jpg",
    hotspots: [
      { pitch: -7.4, yaw: 83.8, text: "Exterior 1", target: "ext1" },
      { pitch: -3.0, yaw: 264.5, text: "Exterior 3", target: "ext3" }
    ]
  },
  {
    id: "ext3", group: "Exterior", name: "Exterior 3",
    low:  "images/exterior/3/low.png",
    med:  "images/exterior/3/med.png",
    high: "images/exterior/3/high.jpg",
    hotspots: [
      { pitch: 0, yaw: 35.0, text: "Interior 2", target: "int2" },
      { pitch: -8.1, yaw: 227.8, text: "Exterior 2", target: "ext2" }
    ]
  },
  {
    id: "int1", group: "Interior", name: "Interior 1",
    low:  "images/interior/1/low.jpg",
    med:  "images/interior/1/med.jpg",
    high: "images/interior/1/high.jpg",
    hotspots: [
      { pitch: -6.0, yaw: 29.8, text: "Interior 2", target: "int2" },
      { pitch: -13.3, yaw: 144.6, text: "Interior 4", target: "int4" }
    ]
  },
  {
    id: "int2", group: "Interior", name: "Interior 2",
    low:  "images/interior/2/low.jpg",
    med:  "images/interior/2/med.jpg",
    high: "images/interior/2/high.jpg",
    hotspots: [
      { pitch: -12.3, yaw: 238.9, text: "Interior 1", target: "int1" },
      { pitch: -4.4, yaw: 335.5, text: "Interior 7", target: "int7" },
    ]
  },
  {
    id: "int3", group: "Interior", name: "Interior 3",
    low:  "images/interior/3/low.jpg",
    med:  "images/interior/3/med.jpg",
    high: "images/interior/3/high.jpg",
    hotspots: [
      { pitch: -18.4, yaw: 296.7, text: "Interior 8", target: "int8" },
      { pitch: -8.8, yaw: 275.5, text: "Interior 7", target: "int7" },
    ]
  },
  {
    id: "int4", group: "Interior", name: "Interior 4",
    low:  "images/interior/4/low.jpg",
    med:  "images/interior/4/med.jpg",
    high: "images/interior/4/high.jpg",
    hotspots: [
      { pitch: -12.7, yaw: 184.6, text: "Interior 1", target: "int1" },
    ]
  },
  {
    id: "int5", group: "Interior", name: "Interior 5",
    low:  "images/interior/5/low.jpg",
    med:  "images/interior/5/med.jpg",
    high: "images/interior/5/high.jpg",
    hotspots: [
      { pitch: -12.0, yaw: 296.6, text: "Interior 7", target: "int7" },
    ]
  },
  {
    id: "int6", group: "Interior", name: "Interior 6",
    low:  "images/interior/6/low.jpg",
    med:  "images/interior/6/med.jpg",
    high: "images/interior/6/high.jpg",
    hotspots: [
      { pitch: -2.6, yaw: 182.4, text: "Interior 7", target: "int7" },
    ]
  },
  {
    id: "int7", group: "Interior", name: "Interior 7",
    low:  "images/interior/7/low.jpg",
    med:  "images/interior/7/med.jpg",
    high: "images/interior/7/high.jpg",
    hotspots: [
      { pitch: -9.2, yaw: 344.4, text: "Interior 2", target: "int2" },
      { pitch: -1.0, yaw: 2.5,   text: "Interior 5", target: "int5" },
      { pitch: -9.2, yaw: 184.2, text: "Interior 6", target: "int6" },
      { pitch: -13.1, yaw: 205.0, text: "Interior 3", target: "int3" }
    ]
  },
  {
    id: "int8", group: "Interior", name: "Interior 8",
    low:  "images/interior/8/low.jpg",
    med:  "images/interior/8/med.jpg",
    high: "images/interior/8/high.jpg",
    hotspots: [
      { pitch: -7.0, yaw: 181.3, text: "Interior 3", target: "int3" },
    ]
  },
];

// ── State ──
let currentScene = null;
let activeId = 'a';
let viewers = { a: null, b: null };

function activeViewer() { return viewers[activeId]; }
function inactiveId()   { return activeId === 'a' ? 'b' : 'a'; }
function panoEl(id)     { return document.getElementById('pano-' + id); }

// Build hotspot config for Pannellum.
// sceneId is kept so Pannellum renders the arrow graphic.
// clickHandlerFunc handles desktop clicks.
// Mobile touch is handled separately in attachTouchToHotspots().
const ARROW_SVG = `<svg viewBox="0 0 56 56" xmlns="http://www.w3.org/2000/svg"><circle cx="28" cy="28" r="26" fill="rgba(0,0,0,0.55)" stroke="white" stroke-width="2"/><polygon points="28,14 42,38 14,38" fill="white"/></svg>`;

function makeHotspotEl(div, args) {
  // args = { text, target }
  div.setAttribute('data-target', args.target);
  div.innerHTML = ARROW_SVG;
  div.style.cssText = 'width:56px;height:56px;cursor:pointer;';

  const tip = document.createElement('span');
  tip.textContent = args.text;
  tip.style.cssText = 'position:absolute;bottom:-24px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.7);color:#fff;font-size:11px;font-family:"Helvetica Neue",sans-serif;white-space:nowrap;padding:3px 8px;border-radius:4px;pointer-events:none;';
  div.appendChild(tip);
}

function buildHotspots(scene) {
  return scene.hotspots.map(h => ({
    pitch: h.pitch,
    yaw: h.yaw,
    createTooltipFunc: makeHotspotEl,
    createTooltipArgs: { text: h.text, target: h.target },
    clickHandlerFunc: () => goToScene(h.target),
  }));
}

// After load, find all hotspot divs by data-target and attach touchend.
function attachTouchToHotspots() {
  const container = panoEl(activeId);
  container.querySelectorAll('.pnlm-hotspot-base[data-target]').forEach(el => {
    const target = el.getAttribute('data-target');
    let moved = false;
    el.addEventListener('touchstart', ()  => { moved = false; }, { passive: true });
    el.addEventListener('touchmove',  ()  => { moved = true;  }, { passive: true });
    el.addEventListener('touchend',   (e) => {
      if (moved) return;
      e.preventDefault();
      e.stopPropagation();
      goToScene(target);
    }, { passive: false });
  });
}

function showOverlay(show) {
  document.getElementById('load-overlay').classList.toggle('hidden', !show);
}

function setQualityBadge(label) {
  const b = document.getElementById('quality-badge');
  b.textContent = label;
  b.style.opacity = '1';
}

function makeViewer(divId, panorama, opts = {}) {
  const el = panoEl(divId);
  if (viewers[divId]) { try { viewers[divId].destroy(); } catch(e){} viewers[divId] = null; }
  viewers[divId] = pannellum.viewer(el, {
    type: 'equirectangular',
    panorama,
    autoLoad: true,
    showControls: false,
    compass: false,
    showFullscreenCtrl: false,
    showZoomCtrl: false,
    mouseZoom: false,
    minHfov: 60, maxHfov: 120,
    hfov:  opts.hfov  || 100,
    pitch: opts.pitch || 0,
    yaw:   opts.yaw   || 0,
    hotSpots: opts.hotSpots || [],
  });
  return viewers[divId];
}

function crossfade(scene, nextUrl, onDone) {
  if (currentScene?.id !== scene.id) return;
  const av = activeViewer();
  const pitch = av ? av.getPitch() : 0;
  const yaw   = av ? av.getYaw()   : 0;
  const hfov  = av ? av.getHfov()  : 100;
  const nextId = inactiveId();

  const v = makeViewer(nextId, nextUrl, { pitch, yaw, hfov, hotSpots: buildHotspots(scene) });

  v.on('load', () => {
    if (currentScene?.id !== scene.id) return;
    const av2 = activeViewer();
    if (av2) { try { v.setYaw(av2.getYaw()); v.setPitch(av2.getPitch()); } catch(e){} }

    panoEl(nextId).style.opacity = '1';
    panoEl(nextId).style.pointerEvents = 'auto';
    panoEl(activeId).style.opacity = '0';
    panoEl(activeId).style.pointerEvents = 'none';

    setTimeout(() => {
      if (currentScene?.id !== scene.id) return;
      const oldId = activeId;
      activeId = nextId;
      if (viewers[oldId]) { try { viewers[oldId].destroy(); } catch(e){} viewers[oldId] = null; }
      attachTouchToHotspots();
      onDone();
    }, 650);
  });

  v.on('error', () => {});
}

function loadQuality(scene, url, label, onDone) {
  if (currentScene?.id !== scene.id) return;
  const img = new Image();
  img.onload = () => crossfade(scene, url, () => { setQualityBadge(label); onDone(); });
  img.onerror = onDone;
  img.src = url;
}

function loadScene(scene) {
  if (currentScene?.id === scene.id) return;
  currentScene = scene;

  document.getElementById('scene-name-display').textContent = scene.name;
  document.querySelectorAll('.scene-btn').forEach(b =>
    b.classList.toggle('active', b.dataset.id === scene.id)
  );

  showOverlay(true);
  setQualityBadge('25%');
  document.getElementById('quality-badge').style.opacity = '1';

  ['a', 'b'].forEach(id => {
    if (viewers[id]) { try { viewers[id].destroy(); } catch(e){} viewers[id] = null; }
    panoEl(id).style.opacity = '0';
    panoEl(id).style.pointerEvents = 'none';
  });
  activeId = 'a';

  const v = makeViewer('a', scene.low, { hotSpots: buildHotspots(scene) });
  panoEl('a').style.opacity = '1';
  panoEl('a').style.pointerEvents = 'auto';

  v.on('load', () => {
    showOverlay(false);
    setQualityBadge('25%');
    attachTouchToHotspots();
    loadQuality(scene, scene.med, '50%', () =>
      loadQuality(scene, scene.high, 'HD', () => {
        setTimeout(() => { document.getElementById('quality-badge').style.opacity = '0'; }, 2000);
      })
    );
  });
  v.on('error', () => { showOverlay(false); });
}

function goToScene(id) {
  const scene = SCENES.find(s => s.id === id);
  if (scene) loadScene(scene);
}

// ── Dev mode ──
let devMode = false;
function toggleDevMode() {
  devMode = !devMode;
  document.getElementById('dev-toggle').textContent = devMode ? 'DEV: ON ✓' : 'DEV: OFF';
  document.getElementById('dev-toggle').style.background = devMode ? 'rgba(201,168,76,0.4)' : 'rgba(201,168,76,0.2)';
  document.getElementById('dev-coords').style.display = devMode ? 'block' : 'none';
  if (devMode) document.getElementById('dev-coords').textContent = 'Tap anywhere to get pitch/yaw';
}

let logoTaps = 0, logoTimer;
document.querySelector('.logo').addEventListener('click', () => {
  logoTaps++;
  clearTimeout(logoTimer);
  logoTimer = setTimeout(() => { logoTaps = 0; }, 2000);
  if (logoTaps >= 5) {
    document.getElementById('dev-toggle').style.display = 'block';
    logoTaps = 0;
  }
});

document.getElementById('viewer-wrap').addEventListener('click', e => {
  if (!devMode) return;
  const av = activeViewer();
  if (!av) return;
  const pitch = av.getPitch().toFixed(1);
  const yaw = ((av.getYaw() % 360) + 360) % 360;
  const yawF = yaw.toFixed(1);
  const coordEl = document.getElementById('dev-coords');
  coordEl.textContent = `Scene: ${currentScene?.id} | pitch: ${pitch} | yaw: ${yawF}`;
  navigator.clipboard?.writeText(`{ pitch: ${pitch}, yaw: ${yawF}, text: "Label", target: "scene_id" }`)
    .then(() => { coordEl.textContent += '  ✓ copied!'; })
    .catch(() => {});
});

// ── Scene nav strip ──
function buildNav() {
  const nav = document.getElementById('scene-nav');
  let lastGroup = null;
  SCENES.forEach(scene => {
    if (scene.group !== lastGroup) {
      const sep = document.createElement('div');
      sep.style.cssText = 'flex-shrink:0;display:flex;align-items:center;font-size:8px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);font-family:"Helvetica Neue",sans-serif;writing-mode:vertical-rl;text-orientation:mixed;padding:0 2px;';
      sep.textContent = scene.group;
      nav.appendChild(sep);
      lastGroup = scene.group;
    }
    const btn = document.createElement('button');
    btn.className = 'scene-btn';
    btn.dataset.id = scene.id;
    btn.setAttribute('role', 'listitem');
    btn.setAttribute('aria-label', scene.name);
    btn.onclick = () => loadScene(scene);
    btn.innerHTML = `
      <div class="scene-thumb">
        <img src="${scene.low}" alt="${scene.name}" loading="lazy">
        <div class="scene-thumb-tag">${scene.group === 'Exterior' ? 'EXT' : 'INT'}</div>
      </div>
      <span class="scene-name">${scene.name}</span>
    `;
    nav.appendChild(btn);
  });
}

buildNav();
loadScene(SCENES[0]);
</script>
</body>
</html>
